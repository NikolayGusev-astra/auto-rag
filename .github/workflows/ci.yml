name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,gateway,web,reranker,pdf]"
      - name: Lint with ruff
        run: |
          python -m ruff check .
      - name: Run pytest
        run: |
          python -m pytest tests -q
      - name: Build wheel
        run: |
          python -m build --wheel
      - name: Install built wheel
        run: |
          python -m pip install dist/*.whl
      - name: MCP smoke test
        run: |
          python -m rag_core.gateway.server --help
